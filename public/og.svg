<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trust Standard Protocol">
  <rect width="1200" height="630" fill="#e7e1d2" />
  <rect width="1200" height="14" fill="#9c5a2e" />
  <g transform="translate(96 150)">
    <rect x="0" y="0" width="120" height="120" rx="26" fill="#15403d" />
    <rect x="17" y="17" width="86" height="86" rx="17" fill="none" stroke="#d99a5e" stroke-width="2.8" opacity="0.55" />
    <path d="M34 63 L55 84 L90 41" fill="none" stroke="#9c5a2e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="240" y="212" font-family="IBM Plex Mono, monospace" font-size="30" letter-spacing="6" fill="#9c5a2e">TRUST STANDARD PROTOCOL</text>
  <text x="96" y="360" font-family="IBM Plex Sans, sans-serif" font-size="68" font-weight="600" fill="#1a1815">Tamper-evident evidence</text>
  <text x="96" y="436" font-family="IBM Plex Sans, sans-serif" font-size="68" font-weight="600" fill="#1a1815">for what your AI did.</text>
  <text x="96" y="516" font-family="IBM Plex Sans, sans-serif" font-size="32" fill="#463f35">Verifiable offline, by anyone — without trusting the vendor.</text>
  <text x="96" y="566" font-family="IBM Plex Mono, monospace" font-size="24" fill="#6b6253">Ed25519 · JCS · TrustEnvelope v3 · Apache-2.0</text>
</svg>
