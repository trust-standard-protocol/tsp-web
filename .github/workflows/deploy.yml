name: Deploy

# Every push to main builds and claim-scans the site, then WAITS for manual
# approval on the `production` environment before anything reaches the server.
# Deploys rsync the static build to /var/www/tsp-site/releases/<sha> and flip
# the `current` symlink atomically; Caddy serves the symlink, so rollback is
# re-pointing it at a previous release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Claim boundary gate
        run: npm run claim-scan

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://truststandardprotocol.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload release
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/tsp-site/releases/${{ github.sha }}/"

      - name: Activate release (atomic symlink flip, keep last 5)
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "ln -sfn /var/www/tsp-site/releases/${{ github.sha }} /var/www/tsp-site/current \
             && cd /var/www/tsp-site/releases && ls -t | tail -n +6 | xargs -r rm -rf"

      - name: Verify live
        run: |
          sleep 3
          curl -fsS https://truststandardprotocol.com/ | grep -qi "trust standard protocol"
          curl -fsS https://truststandardprotocol.com/.well-known/tsp.json > /dev/null
          curl -fsS https://truststandardprotocol.com/robots.txt > /dev/null
