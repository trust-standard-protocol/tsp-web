name: Deploy

# Every push to main builds and claim-scans the site, then WAITS for manual
# approval on the `production` environment before anything reaches the server.
# Deploys rsync the static build to /var/www/tsp-site/releases/<sha> and flip
# the `current` symlink atomically; Caddy serves the symlink, so rollback is
# re-pointing it at a previous release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Claim boundary gate
        run: npm run claim-scan

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-dist
          path: dist
          retention-days: 7
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://truststandardprotocol.com
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: site-dist
          path: dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload release
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/tsp-site/releases/${{ github.sha }}/"

      - name: Activate release (atomic symlink flip, keep last 5)
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "ln -sfn /var/www/tsp-site/releases/${{ github.sha }} /var/www/tsp-site/current \
             && cd /var/www/tsp-site/releases && ls -t | tail -n +6 | xargs -r rm -rf"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: scripts

      - name: Verify live
        run: |
          sleep 3
          node scripts/verify-deploy.mjs
